<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Магнитное поле катушки — 2D</title>
<style>
  :root {
    --bg-0: #0d1117;
    --bg-1: #161b22;
    --bg-2: #21262d;
    --line: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-2: #1f6feb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg-0);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }
  #app {
    display: grid;
    grid-template-columns: 290px 1fr;
    gap: 10px;
    height: 100vh;
    padding: 10px;
  }
  .panel {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    overflow-y: auto;
  }
  .panel h2 {
    margin: 0 0 10px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
  }
  .group { margin-bottom: 16px; }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .row label {
    flex: 0 0 80px;
    color: var(--text-dim);
    text-align: right;
  }
  .row input[type="range"] { flex: 1; }
  .row input[type="number"] {
    flex: 0 0 90px;
  }
  .row .val {
    flex: 0 0 70px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  input[type="number"] {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  input[type="number"]:focus { border-color: var(--accent); }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    height: 18px;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 6px; background: var(--bg-2);
    border: 1px solid var(--line); border-radius: 3px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 50%;
    margin-top: -6px;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb:hover { background: #79b8ff; }
  input[type="range"]::-moz-range-track {
    height: 6px; background: var(--bg-2);
    border: 1px solid var(--line); border-radius: 3px;
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  button {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 12px;
    font: inherit;
    cursor: pointer;
    width: 100%;
    margin-bottom: 6px;
  }
  button:hover { background: #30363d; border-color: var(--text-dim); }
  button:active { background: var(--accent-2); }
  .help {
    color: var(--text-dim);
    line-height: 1.5;
  }
  .help b { color: var(--text); }
  #stage {
    position: relative;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  #canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .hud {
    position: absolute;
    pointer-events: none;
    color: var(--text);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 4px #000;
  }
  .hud-top { top: 12px; left: 14px; }
  .hud-bot { bottom: 10px; left: 14px; color: var(--text-dim); }
</style>
</head>
<body>
<div id="app">
  <aside class="panel">
    <div class="group">
      <h2>Параметры</h2>
      <div class="row">
        <label>Ток I:</label>
        <input id="ctlI" type="range" min="-2000" max="2000" value="500" step="1">
        <span class="val" id="lblI">+5.00 А</span>
      </div>
      <div class="row">
        <label>Радиус R:</label>
        <input id="ctlR" type="number" min="2" max="200" step="1" value="40">
        <span class="val">мм</span>
      </div>
      <div class="row">
        <label>Длина L:</label>
        <input id="ctlL" type="number" min="2" max="500" step="2" value="100">
        <span class="val">мм</span>
      </div>
      <div class="row">
        <label>Витков N:</label>
        <input id="ctlN" type="number" min="1" max="200" step="1" value="30">
        <span class="val"></span>
      </div>
    </div>

    <div class="group">
      <button id="btnOff">Выключить ток</button>
      <button id="btnRev">Реверс ⇄</button>
      <button id="btnMaxP">Максимум +</button>
      <button id="btnMaxN">Максимум −</button>
    </div>

    <div class="group">
      <h2>Подсказка</h2>
      <div class="help">
        <b>×</b> — ток уходит в плоскость экрана<br>
        <b>•</b> — ток выходит из плоскости экрана<br><br>
        Замкнутые контуры — линии магнитного поля.
        Светящиеся точки текут вдоль линий: направление потока зависит от знака тока,
        плотность и скорость — от его величины.
      </div>
    </div>
  </aside>

  <div id="stage">
    <canvas id="canvas"></canvas>
    <div class="hud hud-top" id="hudTop"></div>
    <div class="hud hud-bot" id="hudBot"></div>
  </div>
</div>

<script>
"use strict";

const MU0 = 4 * Math.PI * 1e-7;

// ---------- physics ----------
function bOnAxis(I, R, L, N, z = 0) {
  if (L <= 0 || N <= 0) return 0;
  const n = N / L;
  const a = (z + L / 2) / Math.sqrt((z + L / 2) ** 2 + R * R);
  const b = (z - L / 2) / Math.sqrt((z - L / 2) ** 2 + R * R);
  return 0.5 * MU0 * n * I * (a - b);
}
function bIdeal(I, R, L, N) {
  return L > 0 ? MU0 * (N / L) * I : 0;
}

// stadium-shaped closed field line in the upper half-plane
function fieldLinePoints(rIn, rOut, L, capExtra, n = 240) {
  const pts = new Array(n);
  const L2 = L / 2;
  const rMid = (rIn + rOut) / 2;
  const rAmp = (rOut - rIn) / 2;
  for (let i = 0; i < n; i++) {
    const t = i / n;
    let z, r;
    if (t < 0.4) {
      const u = t / 0.4;
      z = L2 - u * L; r = rOut;
    } else if (t < 0.5) {
      const u = (t - 0.4) / 0.1;
      const theta = Math.PI / 2 - u * Math.PI;
      z = -L2 - capExtra * Math.cos(theta);
      r = rMid + rAmp * Math.sin(theta);
    } else if (t < 0.9) {
      const u = (t - 0.5) / 0.4;
      z = -L2 + u * L; r = rIn;
    } else {
      const u = (t - 0.9) / 0.1;
      const theta = -Math.PI / 2 + u * Math.PI;
      z = L2 + capExtra * Math.cos(theta);
      r = rMid + rAmp * Math.sin(theta);
    }
    pts[i] = [z, r];
  }
  return pts;
}

// ---------- state ----------
const state = {
  I: 5.0,
  R: 0.04,
  L: 0.10,
  N: 30,
  Iref: 20.0,
  fieldLines: [],
  particles: [],
  spawnAcc: 0,
  lastT: performance.now() / 1000,
};

function rebuildFieldLines() {
  const scales = [0.20, 0.40, 0.62, 0.85, 1.10, 1.40, 1.75];
  state.fieldLines = scales.map((s, i) => {
    const rIn = Math.max(0.10 * state.R, state.R * (0.92 - 0.45 * s));
    const rOut = state.R * (1.0 + 1.2 * s);
    const capExtra = state.R * (0.30 + 0.40 * s);
    return {
      scale: s,
      rIn, rOut, capExtra,
      points: fieldLinePoints(rIn, rOut, state.L, capExtra, 240),
      threshold: 0.06 + 0.13 * i,
    };
  });
  state.particles = state.particles.filter(p => p.line < state.fieldLines.length);
}
rebuildFieldLines();

// ---------- canvas ----------
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let dpr = window.devicePixelRatio || 1;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(rect.width * dpr);
  canvas.height = Math.round(rect.height * dpr);
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
new ResizeObserver(resize).observe(canvas.parentElement);
resize();

// ---------- animation ----------
function tick(now) {
  const tNow = now / 1000;
  const dt = Math.max(1e-6, Math.min(0.1, tNow - state.lastT));
  state.lastT = tNow;

  const Iabs = Math.abs(state.I);
  const Inorm = Math.min(1.0, Iabs / state.Iref);
  const sign = state.I >= 0 ? 1.0 : -1.0;
  const speed = Iabs > 0.01 ? (0.04 + 0.55 * Inorm) : 0.0;
  const spawnRate = Iabs < 0.05 ? 0.0 : (4.0 + 80.0 * Inorm);

  const particles = state.particles;
  let kept = 0;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.t = (p.t + speed * dt * sign + 1.0) % 1.0;
    p.age += dt;
    if (p.age < p.maxLife) {
      particles[kept++] = p;
    }
  }
  particles.length = kept;

  if (spawnRate > 0 && state.fieldLines.length) {
    state.spawnAcc += spawnRate * dt;
    let n = state.spawnAcc | 0;
    if (n > 25) n = 25;
    state.spawnAcc -= n;
    while (n-- > 0) {
      // pick eligible field line
      let candidates = [];
      for (let i = 0; i < state.fieldLines.length; i++) {
        if (Inorm >= state.fieldLines[i].threshold * 0.45) candidates.push(i);
      }
      if (!candidates.length) candidates = [0];
      const lineIdx = candidates[(Math.random() * candidates.length) | 0];
      const side = Math.random() < 0.5 ? -1 : 1;
      particles.push({
        line: lineIdx,
        side,
        t: Math.random(),
        age: 0,
        maxLife: 1.6 + 2.6 * Math.random(),
      });
    }
  }
  if (particles.length > 700) particles.splice(0, particles.length - 700);

  draw();
  requestAnimationFrame(tick);
}

// ---------- drawing ----------
function draw() {
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  // background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, "#141923");
  bg.addColorStop(1, "#080c12");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  if (!state.fieldLines.length) return;

  let maxR = 0, maxCap = 0;
  for (const ln of state.fieldLines) {
    if (ln.rOut > maxR) maxR = ln.rOut;
    if (ln.capExtra > maxCap) maxCap = ln.capExtra;
  }
  const margin = 1.10;
  const worldHW = (state.L / 2 + maxCap) * margin;
  const worldHH = maxR * margin;
  const sx = (W - 50) / (2 * worldHW);
  const sy = (H - 50) / (2 * worldHH);
  const scale = Math.min(sx, sy);
  const cx = W / 2;
  const cy = H / 2;
  const w2sX = z => cx + z * scale;
  const w2sY = r => cy - r * scale;

  // axis
  ctx.strokeStyle = "rgba(255,255,255,0.09)";
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w2sX(-worldHW), w2sY(0));
  ctx.lineTo(w2sX(worldHW), w2sY(0));
  ctx.stroke();
  ctx.setLineDash([]);

  const Iabs = Math.abs(state.I);
  const Inorm = Math.min(1.0, Iabs / state.Iref);

  // field-line backbones
  for (const ln of state.fieldLines) {
    let visibility;
    if (Iabs < 0.05) {
      visibility = 0.5;
    } else {
      visibility = Math.max(0, Math.min(1, (Inorm - ln.threshold * 0.45) / 0.30 + 0.15));
    }
    if (visibility <= 0) continue;
    const alpha = 0.08 + 0.32 * visibility;
    ctx.strokeStyle = `rgba(80,140,200,${alpha})`;
    ctx.lineWidth = 1.2;
    for (const side of [+1, -1]) {
      ctx.beginPath();
      const pts = ln.points;
      for (let i = 0; i < pts.length; i++) {
        const x = w2sX(pts[i][0]);
        const y = w2sY(side * pts[i][1]);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }

  // particles (additive blending → glow)
  ctx.globalCompositeOperation = "lighter";
  const reversed = state.I < 0;
  const glowR = reversed ? 255 : 110;
  const glowG = reversed ? 130 : 220;
  const glowB = reversed ? 200 : 255;
  for (const prt of state.particles) {
    const ln = state.fieldLines[prt.line];
    const pts = ln.points;
    const nPts = pts.length;
    const iF = prt.t * nPts;
    let iA = iF | 0; if (iA >= nPts) iA = 0;
    const iB = (iA + 1) % nPts;
    const f = iF - (iF | 0);
    const za = pts[iA][0], ra = pts[iA][1];
    const zb = pts[iB][0], rb = pts[iB][1];
    const zw = za + (zb - za) * f;
    const rw = ra + (rb - ra) * f;
    const x = w2sX(zw);
    const y = w2sY(prt.side * rw);
    const lifeFrac = Math.max(0, 1 - prt.age / prt.maxLife);
    const fadeIn = Math.min(1, prt.age / 0.18);
    const a = lifeFrac * fadeIn;
    if (a <= 0) continue;

    // halo
    const rad = 14;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, rad);
    grad.addColorStop(0, `rgba(255,255,240,${0.95 * a})`);
    grad.addColorStop(0.4, `rgba(${glowR},${glowG},${glowB},${0.55 * a})`);
    grad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fill();
    // core
    ctx.fillStyle = `rgba(255,255,250,${a})`;
    ctx.beginPath();
    ctx.arc(x, y, 1.7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = "source-over";

  // coil rectangle
  const l2 = state.L / 2;
  const x1 = w2sX(-l2), x2 = w2sX(+l2);
  const y1 = w2sY(+state.R), y2 = w2sY(-state.R);
  const rectW = x2 - x1, rectH = y2 - y1;
  const fillGrad = ctx.createLinearGradient(x1, y1, x1, y2);
  const fillAlpha = Iabs > 0.05 ? 0.24 : 0.1;
  fillGrad.addColorStop(0, `rgba(110,175,220,${fillAlpha})`);
  fillGrad.addColorStop(0.5, `rgba(110,175,220,${Math.max(0, fillAlpha - 0.12)})`);
  fillGrad.addColorStop(1, `rgba(110,175,220,${fillAlpha})`);
  ctx.fillStyle = fillGrad;
  roundRect(ctx, x1, y1, rectW, rectH, 4);
  ctx.fill();
  ctx.strokeStyle = "rgba(110,175,220,0.85)";
  ctx.lineWidth = 1.6;
  roundRect(ctx, x1, y1, rectW, rectH, 4);
  ctx.stroke();

  // wires
  const N = state.N;
  if (N > 0) {
    const active = Iabs > 0.05;
    const topInto = state.I >= 0;
    const zs = N === 1 ? [0] : Array.from({ length: N }, (_, i) => -l2 + i * state.L / (N - 1));
    for (const z0 of zs) {
      drawWire(w2sX(z0), w2sY(+state.R), topInto, active);
      drawWire(w2sX(z0), w2sY(-state.R), !topInto, active);
    }
  }

  // HUD text
  const Bc = bOnAxis(state.I, state.R, state.L, state.N, 0);
  const Bi = bIdeal(state.I, state.R, state.L, state.N);
  document.getElementById("hudTop").textContent =
    `I = ${state.I >= 0 ? "+" : ""}${state.I.toFixed(2)} А    ` +
    `R = ${(state.R * 1000).toFixed(1)} мм    ` +
    `L = ${(state.L * 1000).toFixed(1)} мм    ` +
    `N = ${state.N}`;
  document.getElementById("hudBot").textContent =
    `|B|(0,0) = ${(Bc * 1e3 >= 0 ? "+" : "")}${(Bc * 1e3).toPrecision(4)} мТл    ` +
    `B_ид = µ₀nI = ${(Bi * 1e3 >= 0 ? "+" : "")}${(Bi * 1e3).toPrecision(4)} мТл    ` +
    `частиц = ${state.particles.length}`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawWire(x, y, into, active) {
  const size = 7;
  ctx.fillStyle = active ? "#28496b" : "#2d3238";
  ctx.strokeStyle = "rgba(180,200,220,0.78)";
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  if (!active) return;
  if (into) {
    ctx.strokeStyle = "#e6f0fa";
    ctx.lineWidth = 1.6;
    const d = size * 0.55;
    ctx.beginPath();
    ctx.moveTo(x - d, y - d); ctx.lineTo(x + d, y + d);
    ctx.moveTo(x - d, y + d); ctx.lineTo(x + d, y - d);
    ctx.stroke();
  } else {
    ctx.fillStyle = "#e6f0fa";
    ctx.beginPath();
    ctx.arc(x, y, 2.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---------- controls ----------
const $ = (id) => document.getElementById(id);
const ctlI = $("ctlI");
const lblI = $("lblI");
function syncILabel() {
  const v = ctlI.value / 100;
  state.I = v;
  lblI.textContent = (v >= 0 ? "+" : "") + v.toFixed(2) + " А";
}
ctlI.addEventListener("input", syncILabel);
syncILabel();

$("ctlR").addEventListener("input", e => {
  const v = Math.max(1, +e.target.value || 0);
  state.R = v * 1e-3; rebuildFieldLines();
});
$("ctlL").addEventListener("input", e => {
  const v = Math.max(0.5, +e.target.value || 0);
  state.L = v * 1e-3; rebuildFieldLines();
});
$("ctlN").addEventListener("input", e => {
  const v = Math.max(1, Math.round(+e.target.value || 1));
  state.N = v;
});

$("btnOff").addEventListener("click", () => { ctlI.value = 0; syncILabel(); });
$("btnRev").addEventListener("click", () => { ctlI.value = -ctlI.value; syncILabel(); });
$("btnMaxP").addEventListener("click", () => { ctlI.value = 2000; syncILabel(); });
$("btnMaxN").addEventListener("click", () => { ctlI.value = -2000; syncILabel(); });

// ---------- start ----------
requestAnimationFrame(tick);
</script>
</body>
</html>
